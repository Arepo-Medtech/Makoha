name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Supply-chain gate: High/Critical advisories are build-blocking
      # (see CLAUDE.md <security_and_secrets>). Moderate advisories are
      # reported but do not fail the build.
      - name: Dependency audit (fail on High/Critical)
        run: npm audit --audit-level=high

      - name: Contract tests (MCP servers)
        run: npm test

      - name: Verification harness
        run: npm run verification

      - name: Trunk stubs (1.0 through 9.0)
        run: npm run trunk:stub:all

      # Case-set evaluation gate — BLOCKING (test_and_evaluation_gates: the
      # synthetic-case evaluation is a release gate, not a report; wired
      # blocking at M6 once the 45-attested-case minimum was met, at 51).
      # Verifies count, per-file sha256 integrity (transitively re-asserts the
      # ingest-time schema + firewall verdicts), readable-node schema validity,
      # terminology receipts on every candidate code, and clinician attestation.
      # Distribution vs 60/30/10 warns (non-blocking) until the difficulty
      # top-up lands.
      - name: Case-set evaluation gate (blocking)
        run: npm run eval:cases
