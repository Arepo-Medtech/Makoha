name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    # CQL rule-layer translation service (A2.1). Runs the JVM CQL→ELM translator as a
    # Docker service so the `cql:verify` gate can recompile and checksum-check — the JVM
    # lives ONLY here in CI; the runtime stays pure Node (cql-execution). PIN this image
    # to the tag used by `npm run cql:compile` (recorded in verification/rules/library/
    # checksums.json) — an unpinned translator would drift the checksum gate.
    services:
      cql-tx:
        # PINNED by digest to the translator that produced the committed *.elm.json
        # (verification/rules/library/checksums.json). An unpinned tag would drift the
        # checksum gate. Resolved 2026-07-24 from cqframework/cql-translation-service:latest.
        image: cqframework/cql-translation-service@sha256:11b1b14c6179c9e9a515ed0295e2394ecb93747076ce8e7ae89150c25ed679af
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Supply-chain gate: High/Critical advisories are build-blocking
      # (see CLAUDE.md <security_and_secrets>). Moderate advisories are
      # reported but do not fail the build.
      - name: Dependency audit (fail on High/Critical)
        run: npm audit --audit-level=high

      # Secret scan — BLOCKING (LIVE_PLAN L2, R-38; charter security_and_secrets:
      # secret-scanning in CI before any production path). First-party,
      # deterministic, high-confidence credential shapes only (private keys,
      # AWS/GitHub/Anthropic/Slack/Google tokens, signed JWTs) over TRACKED
      # files. Org-grade SAST tool selection remains an operator decision.
      - name: Secret scan (blocking)
        run: npm run security:secrets

      # Harvest licence + identity gate — BLOCKING (FLOW_PLAN H0). Enforces the
      # licence floor mechanically against integration/harvest-manifest.json:
      # no AGPL/GPL in a shippable module, no dropped/deferred repo pulled in,
      # no licence-pending repo wrapped on a shippable path, and the gzxiong vs
      # SNOWTEAM2023 MedRAG rows stay distinct. Armed-and-green until H1+ harvest.
      - name: Harvest licence-clearance gate (blocking)
        run: npm run licence:check

      # Contract tests include the H7 governance-wiring suites
      # (contract-governance-{record-spine,evidence,retrieval-mirage,case-factory,
      # tooluniverse}.js): every harvested path is fail-closed to the portal gate
      # (ARCH_PLAN C9) — REFUSED without a VerificationGateRecord on the exact
      # candidate_output_hash, opens only with an attested record, never flips
      # patient_eligible. FMEA G7 (governance-gate bypass) mitigation, contract-proven.
      - name: Contract tests (MCP servers + H7 governance wiring)
        run: npm test

      # CQL rule-layer translation gate — BLOCKING once ELM is committed (A2.1).
      # Recompiles verification/rules/library/*.cql via the cql-tx service and asserts the
      # committed *.elm.json matches (checksum) — catches ELM drifting from its .cql source.
      # SKIPs green until the first *.elm.json is committed (armed-and-inert, MIRAGE idiom).
      - name: CQL translation gate (blocking once ELM committed)
        run: npm run cql:verify
        env:
          HEYDOC_CQL_TX_URL: http://localhost:8080/cql/translator

      - name: Verification harness
        run: npm run verification

      - name: Trunk stubs (1.0 through 9.0)
        run: npm run trunk:stub:all

      # Case-set evaluation gate — BLOCKING (test_and_evaluation_gates: the
      # synthetic-case evaluation is a release gate, not a report; wired
      # blocking at M6 once the 45-attested-case minimum was met, at 51).
      # Verifies count, per-file sha256 integrity (transitively re-asserts the
      # ingest-time schema + firewall verdicts), readable-node schema validity,
      # terminology receipts on every candidate code, and clinician attestation.
      # Distribution vs 60/30/10 warns (non-blocking) until the difficulty
      # top-up lands.
      - name: Case-set evaluation gate (blocking)
        run: npm run eval:cases

      # MIRAGE trust gate — BLOCKING (FLOW_PLAN H3; evidence-verified-trust §1).
      # First-party MIRAGE-style benchmark (no gzxiong/MedRAG #20 code — #20 is a
      # methodology reference only). RED on: a corpus-acceptance failure, an
      # attested negative-abstain fabrication, an attested adversarial dose-leak,
      # a silent pass with zero attested evidence, or an upstream-tagging mismatch.
      # A retrieval path is patient_eligible:false until it clears the threshold
      # over CLINICIAN-ATTESTED corpus items (and, on top, the H7 governance gate).
      # The v0.1.0 corpus is a draft/unattested first tranche, so no path is
      # eligible today (the correct, invariant-safe state). Reads only
      # benchmark/mirage/corpora — never data/cases (scoring-store firewall).
      - name: MIRAGE trust gate (blocking)
        run: npm run bench:mirage
